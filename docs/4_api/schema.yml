components:
  schemas:
    CategoriaEnum:
      enum:
      - frente
      - lateral_esq
      - lateral_dir
      - traseira
      - interior
      type: string
      description: |-
        * `frente` - Frente
        * `lateral_esq` - Lateral Esquerda
        * `lateral_dir` - Lateral Direita
        * `traseira` - Traseira
        * `interior` - Interior
    Register:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
        username:
          type: string
          title: Usuário
          description: Obrigatório. 150 caracteres ou menos. Letras, números e @/./+/-/_
            apenas.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 6
      required:
      - email
      - id
      - name
      - password
      - username
    TagPeca:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nome:
          type: string
          description: 'Ex: Capô, Porta Dianteira Esq'
          maxLength: 100
        categoria:
          $ref: '#/components/schemas/CategoriaEnum'
      required:
      - categoria
      - id
      - nome
    TokenObtainPair:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - email
      - password
      - refresh
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
