          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEstabelecimentoUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEstabelecimentoUpdate'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstabelecimentoUpdate'
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
