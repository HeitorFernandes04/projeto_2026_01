openapi: 3.0.3
info:
  title: Lava-me API
  version: 1.0.0
  description: Documentação oficial da API do projeto Lava-me.
paths:
  /api/auth/estabelecimento/me/:
    get:
      operationId: auth_estabelecimento_me_retrieve
      description: Endpoint para o Gestor consultar e atualizar dados do seu estabelecimento.
      tags:
      - auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estabelecimento'
          description: ''
    put:
      operationId: auth_estabelecimento_me_update
      description: Endpoint para o Gestor consultar e atualizar dados do seu estabelecimento.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EstabelecimentoUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EstabelecimentoUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EstabelecimentoUpdate'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstabelecimentoUpdate'
          description: ''
    patch:
      operationId: auth_estabelecimento_me_partial_update
      description: Endpoint para o Gestor consultar e atualizar dados do seu estabelecimento.
