components:
  schemas:
    CargoEnum:
      enum:
      - GESTOR
      - LAVADOR
      - DETALHISTA
      type: string
      description: |-
        * `GESTOR` - Gestor
        * `LAVADOR` - Lavador
        * `DETALHISTA` - Detalhista
    CategoriaEnum:
      enum:
      - INTERNO
      - EXTERNO
      type: string
      description: |-
        * `INTERNO` - Interno
        * `EXTERNO` - Externo
    Cliente:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
        username:
          type: string
          title: Usuário
          description: Obrigatório. 150 caracteres ou menos. Letras, números e @/./+/-/_
            apenas.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 6
        telefone_whatsapp:
          type: string
          maxLength: 20
        endereco_padrao:
          type: string
          maxLength: 255
      required:
      - id
      - name
    Estabelecimento:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nome_fantasia:
          type: string
          maxLength: 150
        cnpj:
          type: string
          maxLength: 14
        endereco_completo:
          type: string
          maxLength: 255
        is_active:
          type: boolean
        slug:
          type: string
          nullable: true
          maxLength: 150
          pattern: ^[-a-zA-Z0-9_]+$
        logo:
          type: string
          format: uri
          nullable: true
        logo_url:
          type: string
          readOnly: true
      required:
      - cnpj
      - endereco_completo
      - id
      - logo_url
      - nome_fantasia
    EstabelecimentoPublico:
      type: object
      description: |-
        Exposição pública e segura do Estabelecimento para o Portal de Autoagendamento.
        CA-03: cnpj, faturamento e dados do gestor são omitidos por design (não incluídos em fields).
        CA-02: servicos filtrados para is_active=True via ServicoPublicoSerializer.
      properties:
        id:
          type: integer
          readOnly: true
        nome_fantasia:
          type: string
          maxLength: 150
        endereco_completo:
          type: string
          maxLength: 255
        logo_url:
          type: string
          readOnly: true
        servicos:
          type: string
          readOnly: true
        slug:
          type: string
          nullable: true
          maxLength: 150
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - endereco_completo
      - id
      - logo_url
      - nome_fantasia
      - servicos
    EstabelecimentoUpdate:
      type: object
      description: Serializer restrito para atualização de configurações pelo Gestor.
      properties:
        nome_fantasia:
          type: string
          maxLength: 150
        cnpj:
          type: string
          maxLength: 14
        endereco_completo:
          type: string
          maxLength: 255
        slug:
          type: string
          readOnly: true
          nullable: true
          pattern: ^[-a-zA-Z0-9_]+$
        logo:
          type: string
          format: uri
          nullable: true
        logo_url:
          type: string
          readOnly: true
      required:
      - cnpj
      - endereco_completo
      - logo_url
      - nome_fantasia
      - slug
    Funcionario:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
        username:
          type: string
          title: Usuário
          description: Obrigatório. 150 caracteres ou menos. Letras, números e @/./+/-/_
            apenas.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 6
        estabelecimento:
          type: integer
          writeOnly: true
        cargo:
          allOf:
          - $ref: '#/components/schemas/CargoEnum'
          default: LAVADOR
        is_active:
          type: boolean
          title: Ativo
          description: Indica que o usuário será tratado como ativo. Ao invés de excluir
            contas de usuário, desmarque isso.
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Último login
        date_joined:
          type: string
          format: date-time
          readOnly: true
          title: Data de registro
      required:
      - date_joined
      - id
      - last_login
      - name
      - username
    IncidentePendente:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        ordem_servico_id:
          type: integer
          readOnly: true
        status_ordem_servico:
          type: string
          readOnly: true
        placa:
          type: string
          readOnly: true
        modelo:
          type: string
          readOnly: true
        servico:
          type: string
          readOnly: true
        tag_peca:
          type: string
          readOnly: true
        descricao:
          type: string
        foto_url:
          type: string
          readOnly: true
        data_registro:
          type: string
          format: date-time
          readOnly: true
      required:
      - data_registro
      - descricao
      - foto_url
      - id
      - modelo
      - ordem_servico_id
      - placa
      - servico
      - status_ordem_servico
      - tag_peca
    PatchedEstabelecimentoUpdate:
      type: object
      description: Serializer restrito para atualização de configurações pelo Gestor.
      properties:
        nome_fantasia:
          type: string
          maxLength: 150
        cnpj:
          type: string
          maxLength: 14
        endereco_completo:
          type: string
          maxLength: 255
        slug:
          type: string
          readOnly: true
          nullable: true
          pattern: ^[-a-zA-Z0-9_]+$
        logo:
          type: string
          format: uri
          nullable: true
        logo_url:
          type: string
          readOnly: true
    PatchedIncidentePendente:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        ordem_servico_id:
          type: integer
          readOnly: true
        status_ordem_servico:
          type: string
          readOnly: true
        placa:
          type: string
          readOnly: true
        modelo:
          type: string
          readOnly: true
        servico:
          type: string
          readOnly: true
        tag_peca:
          type: string
          readOnly: true
        descricao:
          type: string
        foto_url:
          type: string
          readOnly: true
        data_registro:
          type: string
          format: date-time
          readOnly: true
    PatchedServico:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nome:
          type: string
          maxLength: 100
        preco:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        duracao_estimada_minutos:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Tempo médio em minutos
        is_active:
          type: boolean
        estabelecimento:
          type: integer
          readOnly: true
    PatchedTagPeca:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nome:
          type: string
          maxLength: 50
        categoria:
          $ref: '#/components/schemas/CategoriaEnum'
        estabelecimento:
          type: integer
          readOnly: true
    Servico:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nome:
          type: string
          maxLength: 100
        preco:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        duracao_estimada_minutos:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Tempo médio em minutos
        is_active:
          type: boolean
        estabelecimento:
          type: integer
          readOnly: true
      required:
      - duracao_estimada_minutos
      - estabelecimento
      - id
      - nome
      - preco
    TagPeca:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nome:
          type: string
          maxLength: 50
        categoria:
          $ref: '#/components/schemas/CategoriaEnum'
        estabelecimento:
          type: integer
          readOnly: true
      required:
      - categoria
      - estabelecimento
      - id
      - nome
    TokenObtainPair:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - email
      - password
      - refresh
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
