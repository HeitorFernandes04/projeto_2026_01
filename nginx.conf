events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Otimizações
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Limite de tamanho de upload (ex: fotos de veículos)
    client_max_body_size 50M;

    # Backend Django
    upstream backend_django {
        server backend:8000;
    }

    server {
        # Configuração inicial escutando apenas porta 80.
        # Se usar Cloudflare Flexible, isso basta. O HTTPS é feito pelo Cloudflare.
        listen 80;
        server_name _; 

        # Arquivos estáticos do Django (painel admin, css, js)
        location /static/ {
            alias /app/static/;
            expires 30d;
        }

        # Arquivos de mídia do Django (fotos enviadas)
        location /media/ {
            alias /app/media/;
            expires 30d;
        }

        # Rota para a API do Django
        location / {
            proxy_pass http://backend_django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
