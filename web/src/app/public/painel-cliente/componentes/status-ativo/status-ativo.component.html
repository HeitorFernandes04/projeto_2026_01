<div class="status-card">
  <!-- Header com ícone e status -->
  <div class="status-header">
    <div class="status-icon">
      <span class="material-symbols-outlined">inventory_2</span>
    </div>
    <div class="status-info">
      <div class="status-label">Status do Serviço</div>
      <div class="status-text">{{ getStatusText() }}</div>
    </div>
  </div>

  <!-- Progresso com etapas -->
  <div class="progress-section">
    <div class="progress-steps">
      <div class="step" *ngFor="let etapa of etapas; let i = index" 
           [class.active]="i <= getEtapaIndex()">
        <div class="step-dot"></div>
        <span class="step-label">{{ etapa.label }}</span>
      </div>
    </div>
    
    <!-- Barra de progresso -->
    <div class="progress-bar">
      <div class="progress-fill" [style.width.%]="getProgressoBarra()"></div>
    </div>
  </div>

  <!-- Previsão de entrega -->
  <div class="delivery-eta">
    <span class="material-symbols-outlined">schedule</span>
    <strong *ngIf="ativo?.status !== 'FINALIZADO'">Previsão de entrega: {{ ativo?.previsao_entrega || '--:--' }}</strong>
    <strong *ngIf="ativo?.status === 'FINALIZADO'">Serviço concluído em: {{ ativo?.data || '--/--/----' }}</strong>
  </div>
</div>
