<main class="auth-cliente">
  <section class="auth-panel">
    <img src="/logo.jpeg" alt="Lava-Me Logo" class="brand-logo">

    <header class="auth-header">
      <h1>{{ modo === 'login' ? 'Acesso do cliente' : 'Criar PIN de acesso' }}</h1>
      <p>{{ modo === 'login' ? 'Entre com seu telefone e PIN.' : 'Confirme seu veiculo e escolha um PIN.' }}</p>
    </header>

    <form class="auth-form" (submit)="enviar(); $event.preventDefault()">
      <label>
        Telefone
        <input
          name="telefone"
          inputmode="numeric"
          autocomplete="tel"
          [(ngModel)]="telefone"
          (input)="onInputTelefone($event)"
          placeholder="(11) 99999-9999"
          required>
      </label>

      <label *ngIf="modo === 'setup'">
        Placa
        <input
          name="placa"
          autocomplete="off"
          [(ngModel)]="placa"
          (input)="onInputPlaca($event)"
          placeholder="ABC-1234"
          required>
      </label>

      <label>
        PIN
        <input
          name="pin"
          inputmode="numeric"
          type="password"
          maxlength="4"
          [(ngModel)]="pin"
          placeholder="0000"
          required>
      </label>

      <label *ngIf="modo === 'setup'">
        Confirmar PIN
        <input
          name="confirmarPin"
          inputmode="numeric"
          type="password"
          maxlength="4"
          [(ngModel)]="confirmarPin"
          placeholder="0000"
          required>
      </label>

      <p class="erro" *ngIf="erro">{{ erro }}</p>

      <button type="submit" [disabled]="!formularioValido || carregando">
        <span *ngIf="!carregando">{{ modo === 'login' ? 'Entrar' : 'Criar PIN' }}</span>
        <span *ngIf="carregando">Aguarde...</span>
      </button>
    </form>

    <button type="button" class="link-mode" (click)="alternarModo()">
      {{ modo === 'login' ? 'Primeiro acesso' : 'Ja tenho PIN' }}
    </button>
  </section>
</main>
